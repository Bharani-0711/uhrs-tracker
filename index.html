<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UHRS Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── PASSCODE SCREEN ── -->
  <div id="lockScreen" class="lock-screen">
    <div class="lock-card">
      <div class="lock-logo">
        <span class="lock-icon">◈</span>
        <span class="lock-title">UHRS Tracker</span>
      </div>
      <p class="lock-sub">Enter your passcode to continue</p>
      <input type="password" id="passcodeInput" class="passcode-input" placeholder="··········" maxlength="10" autocomplete="off" />
      <div id="passcodeError" class="passcode-error hidden">Wrong Passcode</div>
      <button class="btn-primary" onclick="checkPasscode()">Unlock</button>
    </div>
  </div>

  <!-- ── MAIN APP ── -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <span class="header-logo">◈</span>
        <span class="header-title">UHRS Tracker</span>
      </div>
      <div class="header-right">
        <button class="btn-icon" onclick="openSettings()" title="Settings">⚙</button>
        <button class="btn-icon" onclick="lockApp()" title="Lock">⊠</button>
      </div>
    </header>

    <!-- Quick Stats -->
    <section class="stats-strip">
      <div class="stat-card">
        <div class="stat-label">Pending Payout</div>
        <div class="stat-value" id="statPending">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Week Tasks</div>
        <div class="stat-value" id="statWeekTasks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Lifetime Tasks</div>
        <div class="stat-value" id="statLifetime">0</div>
      </div>
    </section>

    <!-- Add Entry Button -->
    <div class="add-bar">
      <button class="btn-primary" onclick="openAddEntry()">+ Add Daily Entry</button>
    </div>

    <!-- Week List -->
    <main class="week-list" id="weekList">
      <!-- Injected by JS -->
    </main>

  </div>

  <!-- ── ADD / EDIT ENTRY MODAL ── -->
  <div id="entryModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <span id="modalTitle">Add Daily Entry</span>
        <button class="btn-icon" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <label>Date</label>
        <input type="date" id="entryDate" />

        <label>Tasks Completed</label>
        <input type="number" id="entryTasks" min="0" placeholder="e.g. 40" />

        <label>Notes <span class="optional">(optional)</span></label>
        <input type="text" id="entryNotes" placeholder="Any notes..." />

        <div id="entryError" class="passcode-error hidden">Please fill date and tasks.</div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveEntry()">Save Entry</button>
      </div>
    </div>
  </div>

  <!-- ── SETTINGS MODAL ── -->
  <div id="settingsModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <span>Currency Settings</span>
        <button class="btn-icon" onclick="closeSettings()">✕</button>
      </div>
      <div class="modal-body">
        <label>USD → EUR Rate (global default)</label>
        <input type="number" id="settingUsdEur" step="0.001" placeholder="e.g. 0.92" />

        <label>EUR → INR Rate (global default)</label>
        <input type="number" id="settingEurInr" step="0.01" placeholder="e.g. 90.5" />
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
        <button class="btn-primary" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <!-- ── WEEK RATE EDITOR MODAL ── -->
  <div id="rateModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <span id="rateModalTitle">Edit Rates</span>
        <button class="btn-icon" onclick="closeRateModal()">✕</button>
      </div>
      <div class="modal-body">
        <label>USD → EUR Rate for this week</label>
        <input type="number" id="rateUsdEur" step="0.001" />

        <label>EUR → INR Rate for this week</label>
        <input type="number" id="rateEurInr" step="0.01" />
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeRateModal()">Cancel</button>
        <button class="btn-primary" onclick="saveWeekRates()">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
